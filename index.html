<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Hand Controlled Particle Universe</title>

<!-- =========================
     MEDIAPIPE LIBRARIES
========================= -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   BODY
========================= */

body{
    overflow:hidden;
    background:#050816;
    font-family:Arial,sans-serif;
}

/* =========================
   CANVAS
========================= */

canvas{
    position:fixed;
    inset:0;
}

/* =========================
   VIDEO
========================= */

video{
    position:fixed;
    bottom:20px;
    right:20px;

    width:220px;

    border-radius:20px;

    transform:scaleX(-1);

    opacity:0.75;

    border:2px solid rgba(255,255,255,0.15);
}

/* =========================
   INFO PANEL
========================= */

.info{

    position:fixed;

    top:20px;
    left:20px;

    color:white;

    z-index:10;

    background:rgba(255,255,255,0.08);

    padding:20px;

    border-radius:25px;

    line-height:2;

    border:1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);

    box-shadow:0 0 25px rgba(0,255,255,0.15);

}

.info h2{

    color:#00ffff;

    margin-bottom:10px;

}

</style>
</head>
<body>

<!-- =========================
     INFO PANEL
========================= -->

<div class="info">

<h2>✨ Hand Particle Universe</h2>

👍 Thumb → Star<br>
☝️ Index → Heart<br>
✌️ Two Fingers → Circle<br>
🤟 Three Fingers → Triangle<br>
🖐️ Four Fingers → House<br>
✨ Move Hand → Move Particles

</div>

<!-- =========================
     CAMERA
========================= -->

<video class="input_video" autoplay playsinline></video>

<!-- =========================
     CANVAS
========================= -->

<canvas id="canvas"></canvas>

<script>

/* =========================
   GET ELEMENTS
========================= */

const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d");

const videoElement = document.querySelector(".input_video");


/* =========================
   CANVAS SIZE
========================= */

canvas.width = innerWidth;
canvas.height = innerHeight;


/* =========================
   RESIZE
========================= */

window.addEventListener("resize",()=>{

    canvas.width = innerWidth;
    canvas.height = innerHeight;

});


/* =========================
   HAND POSITION
========================= */

let handX = canvas.width/2;
let handY = canvas.height/2;


/* =========================
   PREVIOUS HAND POSITION
========================= */

let prevHandX = handX;
let prevHandY = handY;


/* =========================
   HAND SPEED
========================= */

let handSpeedX = 0;
let handSpeedY = 0;


/* =========================
   COLORS
========================= */

const COLORS = {

    normal:"#ffffff",
    heart:"#ff3366",
    star:"#ffd700",
    circle:"#00aaff",
    triangle:"#00ff99",
    house:"#ffcc66"

};


/* =========================
   PARTICLES
========================= */

let particles = [];

const PARTICLE_COUNT = 600;


/* =========================
   PARTICLE CLASS
========================= */

class Particle{

    constructor(){

        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;

        this.targetX = this.x;
        this.targetY = this.y;

        this.vx = (Math.random()-0.5)*1.5;
        this.vy = (Math.random()-0.5)*1.5;

        this.size = Math.random()*2 + 1;

        this.color = COLORS.normal;

    }


    update(){

        /* FLOATING */

        this.targetX += this.vx;
        this.targetY += this.vy;


        /* BOUNCE */

        if(this.targetX < 0 || this.targetX > canvas.width){

            this.vx *= -1;

        }

        if(this.targetY < 0 || this.targetY > canvas.height){

            this.vy *= -1;

        }


        /* SMOOTH MOTION */

        this.x += (this.targetX - this.x) * 0.10;
        this.y += (this.targetY - this.y) * 0.10;


        /* DISTANCE FROM HAND */

        let dx = handX - this.x;
        let dy = handY - this.y;

        let dist = Math.sqrt(dx*dx + dy*dy);


        /* HAND FORCE */

        if(dist < 260){

            this.x -= dx * 0.03;
            this.y -= dy * 0.03;

            this.x += handSpeedX * 0.6;
            this.y += handSpeedY * 0.6;

        }

    }


    draw(){

        ctx.beginPath();

        ctx.fillStyle = this.color;

        ctx.shadowColor = this.color;

        ctx.shadowBlur = 20;

        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

        ctx.fill();

    }

}


/* =========================
   CREATE PARTICLES
========================= */

for(let i=0;i<PARTICLE_COUNT;i++){

    particles.push(new Particle());

}


/* =========================
   RESET PARTICLES
========================= */

function resetParticles(){

    particles.forEach((p)=>{

        p.color = COLORS.normal;

    });

}


/* =========================
   STAR
========================= */

function morphToStar(cx,cy){

    resetParticles();

    particles.forEach((p,i)=>{

        let angle = (Math.PI*2/5)*(i%5);

        let radius = 140;

        p.targetX = cx + Math.cos(angle)*radius;

        p.targetY = cy + Math.sin(angle)*radius;

        p.color = COLORS.star;

    });

}


/* =========================
   HEART
========================= */

function morphToHeart(cx,cy){

    resetParticles();

    particles.forEach((p,i)=>{

        let t = (i/particles.length) * Math.PI*2;

        let x =
        16 * Math.pow(Math.sin(t),3);

        let y =
        -(13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t));

        p.targetX = cx + x*12;

        p.targetY = cy + y*12;

        p.color = COLORS.heart;

    });

}


/* =========================
   CIRCLE
========================= */

function morphToCircle(cx,cy){

    resetParticles();

    particles.forEach((p,i)=>{

        let angle =
        (i/particles.length)*Math.PI*2;

        let radius = 170;

        p.targetX =
        cx + Math.cos(angle)*radius;

        p.targetY =
        cy + Math.sin(angle)*radius;

        p.color = COLORS.circle;

    });

}


/* =========================
   TRIANGLE
========================= */

function morphToTriangle(cx,cy){

    resetParticles();

    particles.forEach((p,i)=>{

        let side = i % 3;

        let progress = (i / particles.length);

        let size = 250;

        let x,y;

        if(side === 0){

            x = -size/2 + progress*size*1.5;
            y = size/2;

        }

        else if(side === 1){

            x = size/2 - progress*size*1.5;
            y = size/2;

        }

        else{

            x = 0;
            y = -size/2 + progress*size*1.5;

        }

        p.targetX = cx + x;
        p.targetY = cy + y;

        p.color = COLORS.triangle;

    });

}


/* =========================
   HOUSE
========================= */

function morphToHouse(cx,cy){

    resetParticles();

    particles.forEach((p,i)=>{

        let part = i % 5;

        let size = 220;

        let x = 0;
        let y = 0;

        /* BASE */

        if(part === 0){

            x = -size/2 + (i%100)*4;
            y = size/2;

        }

        /* LEFT WALL */

        else if(part === 1){

            x = -size/2;
            y = -size/2 + (i%100)*4;

        }

        /* RIGHT WALL */

        else if(part === 2){

            x = size/2;
            y = -size/2 + (i%100)*4;

        }

        /* ROOF LEFT */

        else if(part === 3){

            x = -(i%100)*2;
            y = -(i%100)*2;

        }

        /* ROOF RIGHT */

        else{

            x = (i%100)*2;
            y = -(i%100)*2;

        }

        p.targetX = cx + x;
        p.targetY = cy + y;

        p.color = COLORS.house;

    });

}


/* =========================
   NORMAL FLOAT
========================= */

function releaseParticles(){

    particles.forEach((p)=>{

        p.color = COLORS.normal;

    });

}


/* =========================
   ANIMATION
========================= */

function animate(){

    ctx.fillStyle = "#050816";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach((particle)=>{

        particle.update();

        particle.draw();

    });

    requestAnimationFrame(animate);

}

animate();


/* =========================
   FINGER DETECTION
========================= */

function isFingerUp(tip,pip,landmarks){

    return landmarks[tip].y < landmarks[pip].y;

}


/* =========================
   HAND RESULTS
========================= */

function onResults(results){

    if(results.multiHandLandmarks.length > 0){

        const landmarks =
        results.multiHandLandmarks[0];


        /* PALM */

        const palm = landmarks[9];


        /* HAND POSITION */

        handX =
        canvas.width - (palm.x * canvas.width);

        handY =
        palm.y * canvas.height;


        /* SPEED */

        handSpeedX =
        handX - prevHandX;

        handSpeedY =
        handY - prevHandY;


        prevHandX = handX;
        prevHandY = handY;


        /* FINGERS */

        const thumbUp =
        landmarks[4].x < landmarks[3].x;

        const indexUp =
        isFingerUp(8,6,landmarks);

        const middleUp =
        isFingerUp(12,10,landmarks);

        const ringUp =
        isFingerUp(16,14,landmarks);

        const pinkyUp =
        isFingerUp(20,18,landmarks);


        /* =========================
           STAR
        ========================= */

        if(thumbUp && !indexUp && !middleUp){

            morphToStar(handX,handY);

        }

        /* =========================
           HEART
        ========================= */

        else if(indexUp && !middleUp && !ringUp){

            morphToHeart(handX,handY);

        }

        /* =========================
           CIRCLE
        ========================= */

        else if(indexUp && middleUp && !ringUp){

            morphToCircle(handX,handY);

        }

        /* =========================
           TRIANGLE
        ========================= */

        else if(indexUp && middleUp && ringUp && !pinkyUp){

            morphToTriangle(handX,handY);

        }

        /* =========================
           HOUSE
        ========================= */

        else if(indexUp && middleUp && ringUp && pinkyUp){

            morphToHouse(handX,handY);

        }

        /* =========================
           NORMAL
        ========================= */

        else{

            releaseParticles();

        }

    }

}


/* =========================
   MEDIAPIPE HANDS
========================= */

const hands = new Hands({

    locateFile:(file)=>{

        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;

    }

});


hands.setOptions({

    maxNumHands:1,

    modelComplexity:1,

    minDetectionConfidence:0.7,

    minTrackingConfidence:0.7

});


hands.onResults(onResults);


/* =========================
   CAMERA
========================= */

const camera = new Camera(videoElement,{

    onFrame:async()=>{

        await hands.send({
            image:videoElement
        });

    },

    width:1280,
    height:720

});


camera.start();

</script>

</body>
</html>
